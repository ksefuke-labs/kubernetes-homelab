apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: '1.19.3'
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
  install:
      crds: Create
      remediation:
        retries: 3
  upgrade:
      crds: CreateReplace
      remediation:
        retries: 3
  values:
    crds:
      enabled: true
    dns01RecursiveNameservers: "1.1.1.1:53,1.0.0.1:53"
    dns01RecursiveNameserversOnly: true
    enableCertificateOwnerRef: false