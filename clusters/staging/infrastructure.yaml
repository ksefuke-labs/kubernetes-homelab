apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name:  infrastructure
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/staging/infra
  prune: false
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
